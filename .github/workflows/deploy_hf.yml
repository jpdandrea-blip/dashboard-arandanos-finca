name: Deploy Dashboard a Hugging Face Spaces

on:
  push:
    branches: [master]
    paths:
      - 'dashboard_arandanos.py'
      - 'requirements.txt'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Push a Hugging Face Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USER:  ${{ secrets.HF_USER }}
          HF_SPACE: ${{ secrets.HF_SPACE }}
        run: |
          git config --global user.email "noreply@huggingface.co"
          git config --global user.name  "GitHub Actions"

          git clone "https://$HF_USER:$HF_TOKEN@huggingface.co/spaces/$HF_USER/$HF_SPACE" hf_repo

          echo "=== Archivos en el Space ==="
          ls -la hf_repo/

          cp dashboard_arandanos.py hf_repo/streamlit_app.py
          cp requirements.txt       hf_repo/requirements.txt

          # Dockerfile propio con sintaxis correcta + timestamp para forzar rebuild
          cat > hf_repo/Dockerfile <<EOF
FROM python:3.11
WORKDIR /code
COPY requirements.txt .
RUN pip install --no-cache-dir -r requirements.txt
COPY . .
EXPOSE 7860
ENV PORT=7860
# BUILD: $(date -u +%Y-%m-%dT%H:%M:%SZ)
CMD streamlit run streamlit_app.py --server.port=7860 --server.address=0.0.0.0
EOF

          cd hf_repo
          git add -A
          if git diff --staged --quiet; then
            echo "Sin cambios."
          else
            git commit -m "chore: sync dashboard desde GitHub $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          fi
