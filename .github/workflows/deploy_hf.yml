name: Deploy Dashboard a Hugging Face Spaces

on:
  push:
    branches: [master]
    paths:
      - 'dashboard_arandanos.py'
      - 'requirements.txt'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Push a Hugging Face Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USER:  ${{ secrets.HF_USER }}
          HF_SPACE: ${{ secrets.HF_SPACE }}
        run: |
          git config --global user.email "noreply@huggingface.co"
          git config --global user.name  "GitHub Actions"

          git clone "https://$HF_USER:$HF_TOKEN@huggingface.co/spaces/$HF_USER/$HF_SPACE" hf_repo

          cp dashboard_arandanos.py hf_repo/streamlit_app.py
          cp requirements.txt       hf_repo/requirements.txt

          echo "FROM python:3.11"                                                                          > hf_repo/Dockerfile
          echo "WORKDIR /code"                                                                            >> hf_repo/Dockerfile
          echo "COPY requirements.txt ."                                                                  >> hf_repo/Dockerfile
          echo "RUN pip install --no-cache-dir -r requirements.txt"                                      >> hf_repo/Dockerfile
          echo "COPY . ."                                                                                 >> hf_repo/Dockerfile
          echo "EXPOSE 7860"                                                                              >> hf_repo/Dockerfile
          echo "ENV PORT=7860"                                                                            >> hf_repo/Dockerfile
          echo "# BUILD: $(date -u +%Y-%m-%dT%H:%M:%SZ)"                                                >> hf_repo/Dockerfile
          echo "CMD streamlit run streamlit_app.py --server.port=7860 --server.address=0.0.0.0"         >> hf_repo/Dockerfile

          cd hf_repo
          git add -A
          if git diff --staged --quiet; then
            echo "Sin cambios."
          else
            git commit -m "chore: sync dashboard desde GitHub $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          fi
